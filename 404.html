<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — M-Auto Online</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f1623">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1623;
      color: #e2e8f0;
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    .num {
      font-family: 'Syne', sans-serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.04em;
    }
    .msg { font-size: 1.1rem; color: #94a3b8; max-width: 360px; line-height: 1.6; }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #2563eb;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 12px 24px;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .back:hover { background: #1d4ed8; transform: translateY(-2px); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; color: #475569; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <p class="logo">M-AUTO ONLINE</p>
  <div class="num">404</div>
  <p class="msg">Página não encontrada. O link pode ter expirado ou o endereço está incorrecto.</p>
  <a href="/" class="back">← Voltar ao início</a>
</body>
</html>
