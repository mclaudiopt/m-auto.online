<div><h1 class="toc-header" id="john-deere-简介"><a href="#john-deere-简介" class="toc-anchor">¶</a> JOHN DEERE 简介</h1><div>
</div><p>约翰迪尔（John Deere）公司，在1837年由铁匠约翰·迪尔（John Deere）创办，是美国迪尔公司（英语：Deere &amp; Company）生产农业、建筑、森林机械设备和柴油引擎等使用的品牌，业务横跨全球所有农林地；2013年，财富美国500强排名第85位，在财富世界500强排名第307位。</p><div>
</div><p>约翰迪尔的产品包括农业机械、工程机械、林业机械等。<br>
