  <!-- ── SPLASH SCREEN CSS ── -->
  <style>
    #splashScreen {
      position: fixed;
      inset: 0;
      z-index: 999999;
      background: linear-gradient(160deg, #060d1a 0%, #0b1220 55%, #0d1830 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: 'Manrope', 'Segoe UI', sans-serif;
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }
    #splashScreen.sp-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .sp-ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid rgba(37, 99, 235, 0.18);
      border-top-color: #2563eb;
      animation: spSpin 1.1s linear infinite;
      margin-bottom: 30px;
    }
    .sp-logo {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 2.6rem;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -1px;
      margin-bottom: 8px;
      animation: spFadeDown 0.7s ease both;
    }
    .sp-logo .sp-m    { color: #ffffff; }
    .sp-logo .sp-sep  { color: rgba(255,255,255,0.25); font-style: normal; font-weight: 300; }
    .sp-logo .sp-o    { color: #2563eb; }
    .sp-tagline {
      font-family: 'Syne', 'Segoe UI', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      color: #3a5a8a;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 56px;
      animation: spFadeDown 0.9s ease both;
    }
    .sp-bar-track {
      width: 260px;
      height: 3px;
      background: rgba(37, 99, 235, 0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .sp-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1e40af 0%, #2563eb 60%, #60a5fa 100%);
      border-radius: 2px;
      transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
    }
    .sp-status {
      font-size: 0.68rem;
      font-weight: 700;
      color: #2563eb;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      min-height: 14px;
      animation: spFadeUp 1s ease both;
    }
    .sp-credits {
      position: absolute;
      bottom: 22px;
      font-size: 10px;
      color: rgba(148, 163, 184, 0.3);
      letter-spacing: 0.06em;
    }
    @keyframes spSpin     { to { transform: rotate(360deg); } }
    @keyframes spFadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spFadeUp   { from { opacity:0; transform:translateY(10px);  } to { opacity:1; transform:translateY(0); } }
  </style>

  <!-- ── SPLASH SCREEN JS ── -->
  <script>
  (function() {
    var bar    = document.getElementById('spBar');
    var status = document.getElementById('spStatus');
    var splash = document.getElementById('splashScreen');
    var steps  = [
      { p: 8,   t: 'Initializing...'            },
      { p: 20,  t: 'Loading configuration...'   },
      { p: 34,  t: 'Checking engine...'         },
      { p: 48,  t: 'Loading diagnostics...'     },
      { p: 61,  t: 'Connecting to servers...'   },
      { p: 75,  t: 'Verifying database...'      },
      { p: 90,  t: 'Almost ready...'            },
      { p: 100, t: 'System ready.'              }
    ];
    var i = 0;
    function next() {
      if (i < steps.length) {
        bar.style.width    = steps[i].p + '%';
        status.textContent = steps[i].t;
        i++;
        setTimeout(next, 260 + Math.random() * 320);
      } else {
        setTimeout(function() { splash.classList.add('sp-hidden'); }, 550);
      }
    }
    setTimeout(next, 300);
  })();
  </script>
