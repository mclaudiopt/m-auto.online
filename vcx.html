<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M-Auto.online — VCX Manager</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; background: #f1f5f9; color: #1e293b; }

/* HEADER */
#header { background: #fff; border-bottom: 2px solid #2563eb; padding: 0; }
#header-inner { display: table; width: 100%; height: 50px; }
#header-left  { display: table-cell; vertical-align: middle; padding: 0 16px; }
#header-right { display: table-cell; vertical-align: middle; padding: 0 16px; text-align: right; white-space: nowrap; }
#logo  { font-size: 17px; font-weight: 700; color: #2563eb; letter-spacing: -0.5px; line-height: 1; }
#logo span { color: #0f172a; }
#tagline { font-size: 10px; color: #94a3b8; margin-top: 2px; letter-spacing: 0.5px; }

/* LANG BUTTONS */
#lang-bar { display: inline-block; }
button.lang-btn {
  background: transparent; border: 1px solid #cbd5e1;
  color: #64748b; font-size: 10px; font-weight: 700;
  padding: 3px 8px; cursor: pointer; font-family: inherit; letter-spacing: 0.5px;
}
button.lang-btn:hover { border-color: #2563eb; color: #2563eb; }
button.lang-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
button.refresh-btn {
  background: transparent; border: 1px solid #cbd5e1; color: #94a3b8;
  font-size: 14px; width: 26px; height: 26px; cursor: pointer; line-height: 1; padding: 0;
  margin-left: 6px; vertical-align: middle;
}
button.refresh-btn:hover { border-color: #2563eb; color: #2563eb; }

/* MERCEDES STRIP */
#mercedes-strip {
  background: #fbbf24;
  border-top: 3px solid #f59e0b;
  padding: 14px 20px;
  text-align: center;
  font-size: 15px;
  font-weight: 700;
  color: #78350f;
  letter-spacing: 0.3px;
  line-height: 1.5;
}

/* MAIN */
#main { padding: 0 16px 16px 16px; }
.section-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 12px 0; }

/* GRID — table layout for IE */
.grid { font-size: 0; }
.grid a.card { display: inline-block; vertical-align: top; font-size: 13px; margin: 0 14px 14px 0; }

/* CARD */
a.card {
  text-align: center;
  width: 175px; height: 175px;
  text-decoration: none;
  padding: 18px 14px;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-top: 4px solid #2563eb;
  color: #1e293b;
  cursor: pointer;
  vertical-align: top;
}
a.card:hover { background: #eff6ff; }
.card-icon { margin-bottom: 12px; padding-top: 14px; }
.card-icon svg { width: 46px; height: 46px; }
.card-title { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 5px; line-height: 1.2; }
.card-desc  { font-size: 10px; color: #64748b; line-height: 1.4; }

/* FOOTER */
#footer { border-top: 1px solid #e2e8f0; padding: 10px 16px; font-size: 11px; color: #94a3b8; background: #fff; }
</style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div id="header-left">
      <div id="logo">M-AUTO<span>.online</span></div>
      <div id="tagline" id="t-tagline">Diagn&oacute;stico Profissional</div>
    </div>
    <div id="header-right">
      <div id="lang-bar">
        <button class="lang-btn active" onclick="setLang('pt')">PT</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('de')">DE</button>
      </div>
      <button class="refresh-btn" onclick="location.reload(true)" title="Atualizar">&#8635;</button>
    </div>
  </div>
</div>

<div id="main">
  <div class="section-label" id="t-section">Software &amp; Documenta&ccedil;&atilde;o</div>
  <div class="grid">

    <a class="card" onclick="openUrl('https://m-auto.online/vcx-help.html')">
      <div class="card-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="4" width="26" height="36" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
          <rect x="14" y="11" width="14" height="2.5" rx="1" fill="#2563eb"/>
          <rect x="14" y="17" width="14" height="2.5" rx="1" fill="#2563eb"/>
          <rect x="14" y="23" width="9"  height="2.5" rx="1" fill="#93c5fd"/>
          <circle cx="37" cy="37" r="8" fill="#2563eb"/>
          <line x1="34" y1="37" x2="40" y2="37" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="37" y1="34" x2="37" y2="40" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-title" id="t-guide-title">Manual VCI</div>
      <div class="card-desc"  id="t-guide-desc">Instalar, configurar e usar</div>
    </a>

    <a class="card" onclick="openUrl('https://m-auto.online/vcx-se-explicacao.html')">
      <div class="card-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
          <circle cx="24" cy="18" r="4" fill="#2563eb"/>
          <rect x="21" y="24" width="6" height="12" rx="2" fill="#2563eb"/>
        </svg>
      </div>
      <div class="card-title" id="t-explain-title">Como Funciona</div>
      <div class="card-desc"  id="t-explain-desc">Licen&ccedil;as, protocolos e liga&ccedil;&atilde;o</div>
    </a>

    <a class="card" onclick="openUrl('https://m-auto.online')">
      <div class="card-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="19" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
          <ellipse cx="24" cy="24" rx="8" ry="19" fill="none" stroke="#2563eb" stroke-width="1.5"/>
          <line x1="5" y1="24" x2="43" y2="24" stroke="#2563eb" stroke-width="1.5"/>
          <path d="M24 5 Q32 14 32 24 Q32 34 24 43" fill="none" stroke="#93c5fd" stroke-width="1.2"/>
        </svg>
      </div>
      <div class="card-title" id="t-portal-title">M-AUTO.online</div>
      <div class="card-desc"  id="t-portal-desc">Loja &amp; servi&ccedil;os</div>
    </a>

  </div>
</div>

<div id="mercedes-strip">
  &#128667; &nbsp; <span id="t-trucks">agora com suporte a Ve&iacute;culos Pesados Mercedes / Daimler</span>
</div>

<div id="footer">
  &copy; 2026 M-Auto.online &mdash; <span id="t-footer">Todos os direitos reservados</span>
</div>

<script>
function openUrl(url) {
  try {
    var sh = new ActiveXObject('WScript.Shell');
    sh.Run('cmd /c start "" "microsoft-edge:' + url + '"', 0, false);
  } catch(e) {
    window.location.href = url;
  }
}

var i18n = {
  pt: {
    tagline: 'Diagn\u00f3stico Profissional',
    section: 'Software &amp; Documenta\u00e7\u00e3o',
    trucks: 'agora com suporte a Ve\u00edculos Pesados Mercedes / Daimler \u00b7 12V e 24V inclu\u00eddo \u00b7 Euro 6',
    guideTitle: 'Manual VCI', guideDesc: 'Instalar, configurar e usar',
    explainTitle: 'Como Funciona', explainDesc: 'Licen\u00e7as, protocolos e liga\u00e7\u00e3o',
    portalTitle: 'M-AUTO.online', portalDesc: 'Loja &amp; servi\u00e7os',
    footer: 'Todos os direitos reservados'
  },
  en: {
    tagline: 'Professional Diagnostics',
    section: 'Software &amp; Documentation',
    trucks: 'now with Heavy Vehicle support Mercedes / Daimler \u00b7 12V &amp; 24V included \u00b7 Euro 6',
    guideTitle: 'VCI Manual', guideDesc: 'Install, configure and use',
    explainTitle: 'How It Works', explainDesc: 'Licenses, protocols and connection',
    portalTitle: 'M-AUTO.online', portalDesc: 'Shop &amp; services',
    footer: 'All rights reserved'
  },
  fr: {
    tagline: 'Diagnostic Professionnel',
    section: 'Logiciels &amp; Documentation',
    trucks: 'maintenant avec support Poids Lourds Mercedes / Daimler \u00b7 12V et 24V inclus \u00b7 Euro 6',
    guideTitle: 'Manuel VCI', guideDesc: 'Installer, configurer et utiliser',
    explainTitle: 'Comment \u00e7a marche', explainDesc: 'Licences, protocoles et connexion',
    portalTitle: 'M-AUTO.online', portalDesc: 'Boutique &amp; services',
    footer: 'Tous droits r\u00e9serv\u00e9s'
  },
  de: {
    tagline: 'Professionelle Diagnose',
    section: 'Software &amp; Dokumentation',
    trucks: 'jetzt mit Nutzfahrzeug-Unterst\u00fctzung Mercedes / Daimler \u00b7 12V und 24V inklusive \u00b7 Euro 6',
    guideTitle: 'VCI Handbuch', guideDesc: 'Installieren, konfigurieren, nutzen',
    explainTitle: 'So funktioniert es', explainDesc: 'Lizenzen, Protokolle und Verbindung',
    portalTitle: 'M-AUTO.online', portalDesc: 'Shop &amp; Dienste',
    footer: 'Alle Rechte vorbehalten'
  }
};

function setLang(lang) {
  var t = i18n[lang];
  document.getElementById('t-tagline').innerHTML      = t.tagline;
  document.getElementById('t-section').innerHTML      = t.section;
  document.getElementById('t-trucks').innerHTML       = t.trucks;
  document.getElementById('t-guide-title').innerHTML  = t.guideTitle;
  document.getElementById('t-guide-desc').innerHTML   = t.guideDesc;
  document.getElementById('t-explain-title').innerHTML = t.explainTitle;
  document.getElementById('t-explain-desc').innerHTML  = t.explainDesc;
  document.getElementById('t-portal-title').innerHTML = t.portalTitle;
  document.getElementById('t-portal-desc').innerHTML  = t.portalDesc;
  document.getElementById('t-footer').innerHTML       = t.footer;
  var btns = document.getElementById('lang-bar').getElementsByTagName('button');
  for (var i = 0; i < btns.length; i++) {
    btns[i].className = btns[i].innerHTML === lang.toUpperCase() ? 'lang-btn active' : 'lang-btn';
  }
}
</script>
</body>
</html>
