<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M-Auto.online — VCX Manager</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; background: #f1f5f9; color: #1e293b; }

/* HEADER */
#header { background: #1e293b; padding: 12px 20px; border-bottom: 3px solid #2563eb; }
#header-top { display: -ms-flexbox; display: flex; -ms-flex-pack: justify; justify-content: space-between; -ms-flex-align: center; align-items: center; }
#logo { font-size: 22px; font-weight: 700; color: #2563eb; letter-spacing: -0.5px; line-height: 1; }
#logo span { color: #f1f5f9; }
#tagline { font-size: 10px; color: #64748b; margin-top: 3px; letter-spacing: 2px; text-transform: uppercase; }

/* LANG BUTTONS */
#lang-bar { display: -ms-flexbox; display: flex; gap: 4px; }
button.lang-btn {
  background: transparent; border: 1px solid #475569;
  color: #94a3b8; font-size: 10px; font-weight: 700;
  padding: 4px 9px; cursor: pointer; font-family: inherit; letter-spacing: 0.5px;
}
button.lang-btn:hover { border-color: #2563eb; color: #60a5fa; }
button.lang-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }

/* MAIN */
#main { padding: 24px 20px; }
.section-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 16px 0; }

/* GRID */
.grid { display: -ms-flexbox; display: flex; -ms-flex-wrap: wrap; flex-wrap: wrap; gap: 14px; }

/* CARD */
a.card {
  display: -ms-flexbox; display: flex;
  -ms-flex-direction: column; flex-direction: column;
  -ms-flex-pack: center; justify-content: center;
  -ms-flex-align: center; align-items: center;
  text-align: center;
  width: 190px; height: 190px;
  text-decoration: none;
  padding: 20px 16px;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-top: 4px solid #2563eb;
  color: #1e293b;
  -webkit-transition: box-shadow 0.15s, -webkit-transform 0.15s;
  transition: box-shadow 0.15s, transform 0.15s;
}
a.card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.13); -webkit-transform: translateY(-2px); transform: translateY(-2px); }

.card-icon { margin-bottom: 14px; }
.card-icon svg { width: 48px; height: 48px; }
.card-title { font-size: 16px; font-weight: 700; color: #1e293b; margin-bottom: 6px; line-height: 1.2; }
.card-desc  { font-size: 11px; color: #64748b; line-height: 1.4; }

/* FOOTER */
#footer { border-top: 1px solid #e2e8f0; padding: 14px 20px; font-size: 11px; color: #94a3b8; background: #fff; }
#footer a { color: #2563eb; text-decoration: none; }
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div>
      <div id="logo">M-AUTO<span>.online</span></div>
      <div id="tagline">Simply Digital &mdash; <span id="t-tagline">Diagnóstico Profissional</span></div>
    </div>
    <div id="lang-bar">
      <button class="lang-btn active" onclick="setLang('pt')">PT</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" onclick="setLang('de')">DE</button>
    </div>
  </div>
</div>

<div id="main">
  <div class="section-label" id="t-section">Software &amp; Documentação</div>
  <div class="grid">

    <!-- GUIDE -->
    <a href="vcx-help.html" target="_blank" class="card">
      <div class="card-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="4" width="26" height="36" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
          <rect x="14" y="11" width="14" height="2.5" rx="1" fill="#2563eb"/>
          <rect x="14" y="17" width="14" height="2.5" rx="1" fill="#2563eb"/>
          <rect x="14" y="23" width="9"  height="2.5" rx="1" fill="#93c5fd"/>
          <circle cx="37" cy="37" r="8" fill="#2563eb"/>
          <line x1="34" y1="37" x2="40" y2="37" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="37" y1="34" x2="37" y2="40" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-title" id="t-guide-title">Manual VCI</div>
      <div class="card-desc"  id="t-guide-desc">Instalar, configurar e usar</div>
    </a>

    <!-- M-AUTO PORTAL — white card -->
    <a href="https://m-auto.online" target="_blank" class="card">
      <div class="card-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="19" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
          <ellipse cx="24" cy="24" rx="8" ry="19" fill="none" stroke="#2563eb" stroke-width="1.5"/>
          <line x1="5" y1="24" x2="43" y2="24" stroke="#2563eb" stroke-width="1.5"/>
          <path d="M24 5 Q32 14 32 24 Q32 34 24 43" fill="none" stroke="#93c5fd" stroke-width="1.2"/>
        </svg>
      </div>
      <div class="card-title" id="t-portal-title">M-AUTO.online</div>
      <div class="card-desc"  id="t-portal-desc">Loja &amp; serviços</div>
    </a>

  </div>
</div>

<div id="footer">
  &copy; 2026 <a href="https://m-auto.online">M-Auto.online</a> &mdash; <span id="t-footer">Todos os direitos reservados</span>
</div>

<script>
var i18n = {
  pt: { tagline:'Diagn\u00f3stico Profissional', section:'Software &amp; Documenta\u00e7\u00e3o', guideTitle:'Manual VCI', guideDesc:'Instalar, configurar e usar', portalTitle:'M-AUTO.online', portalDesc:'Loja &amp; servi\u00e7os', footer:'Todos os direitos reservados' },
  en: { tagline:'Professional Diagnostics',     section:'Software &amp; Documentation',       guideTitle:'VCI Manual',   guideDesc:'Install, configure and use',       portalTitle:'M-AUTO.online', portalDesc:'Shop &amp; services',        footer:'All rights reserved' },
  fr: { tagline:'Diagnostic Professionnel',     section:'Logiciels &amp; Documentation',      guideTitle:'Manuel VCI',   guideDesc:'Installer, configurer et utiliser', portalTitle:'M-AUTO.online', portalDesc:'Boutique &amp; services',    footer:'Tous droits r\u00e9serv\u00e9s' },
  de: { tagline:'Professionelle Diagnose',      section:'Software &amp; Dokumentation',       guideTitle:'VCI Handbuch', guideDesc:'Installieren, konfigurieren, nutzen', portalTitle:'M-AUTO.online', portalDesc:'Shop &amp; Dienste',       footer:'Alle Rechte vorbehalten' }
};
function setLang(lang) {
  var t = i18n[lang];
  document.getElementById('t-tagline').innerHTML     = t.tagline;
  document.getElementById('t-section').innerHTML     = t.section;
  document.getElementById('t-guide-title').innerHTML = t.guideTitle;
  document.getElementById('t-guide-desc').innerHTML  = t.guideDesc;
  document.getElementById('t-portal-title').innerHTML = t.portalTitle;
  document.getElementById('t-portal-desc').innerHTML = t.portalDesc;
  document.getElementById('t-footer').innerHTML      = t.footer;
  var btns = document.getElementById('lang-bar').getElementsByTagName('button');
  for (var i = 0; i < btns.length; i++) {
    btns[i].className = btns[i].innerHTML === lang.toUpperCase() ? 'lang-btn active' : 'lang-btn';
  }
}
</script>
</body>
</html>
